id: github_05
service: github
name: Find latest release and list key dependencies
complexity: multi_step_read
prompt: |
  For the repository anthropics/anthropic-sdk-python, perform these steps:
  1. Find the latest release version tag
  2. Read the pyproject.toml file to extract the project dependencies
  3. Identify the core runtime dependencies (not dev/test dependencies)

  Return a JSON object with:
  - "latest_release": the version tag (e.g. "v0.84.0")
  - "package_name": the package name from pyproject.toml
  - "dependencies": an array of the core dependency package names (just the names, not version constraints)

  Return ONLY the JSON object, no other text.
verification:
  type: contains
  ground_truth:
    - "anthropic"
    - "httpx"
    - "pydantic"
    - "anyio"
    - "jiter"
