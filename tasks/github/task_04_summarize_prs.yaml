id: github_04
service: github
name: Find and summarize merged PRs by contributor
complexity: complex_read
prompt: |
  In the repository anthropics/anthropic-sdk-python, find all pull requests authored
  by "karpetrosyan" that have been merged. For each merged PR, provide:
  - The PR number
  - The PR title
  - A one-sentence summary of what the PR does (based on its title and description)

  Return a JSON array of objects with "number", "title", and "summary" fields,
  sorted by PR number descending. Return ONLY the JSON array, no other text.
verification:
  type: llm_judge
  judge_prompt: |
    The agent was asked to find all merged PRs by "karpetrosyan" in anthropics/anthropic-sdk-python.
    Known merged PRs by this author include:
    - #1158 "fix(structured outputs): send structured output beta header when format is omitted"
    - #1090 "feat: allow raw JSON schema to be passed to messages.stream()"
    - #1086 "feat(tool runner): add support for server-side tools"
    - #1045 "fix(client): resolve non-functional default socket options"
    - #982 "fix(tests): suppress warnings in tests when running on the latest Python versions"
    - #974 "feat(bedrock): automatically infer AWS Region in Bedrock clients"
    Evaluate if the agent found at least 3 of these PRs and provided reasonable summaries.
    The summaries should accurately reflect the purpose of each PR.
