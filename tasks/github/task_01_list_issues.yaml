id: github_01
service: github
name: List open issues mentioning a keyword
complexity: simple_read
prompt: |
  List open issues in the repository anthropics/anthropic-sdk-python that mention
  "streaming" in the title. Return a JSON array of objects with "number" and "title"
  fields, sorted by issue number descending. Return ONLY the JSON array, no other text.
verification:
  type: contains
  ground_truth:
    - "streaming"
    - "number"
    - "title"
