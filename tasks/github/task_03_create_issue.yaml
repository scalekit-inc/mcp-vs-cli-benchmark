id: github_03
service: github
name: Get repository metadata and installation instructions
complexity: simple_read
prompt: |
  Look at the repository anthropics/anthropic-sdk-python and answer these questions:
  1. What license does the project use?
  2. What is the primary programming language?
  3. What is the pip install command to install the package?
  4. What is the minimum Python version required?

  Return a JSON object with fields "license", "language", "install_command", and
  "min_python_version". Return ONLY the JSON object, no other text.
verification:
  type: contains
  ground_truth:
    - "MIT"
    - "Python"
    - "pip install anthropic"
    - "3.9"
