id: github_02
service: github
name: Get PR details including review status
complexity: multi_step_read
prompt: |
  Get the details of pull request #1158 in the repository anthropics/anthropic-sdk-python.
  Return a JSON object with these fields:
  - "number": the PR number
  - "title": the PR title
  - "state": whether the PR is open, closed, or merged (use lowercase)
  - "author": the PR author's GitHub username
  - "reviewer": the username of the person who approved the PR

  Return ONLY the JSON object, no other text.
verification:
  type: contains
  ground_truth:
    - "1158"
    - "structured output"
    - "merged"
    - "karpetrosyan"
    - "RobertCraigie"
